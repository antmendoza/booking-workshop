name: Build Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        solution:
          - run-a-simple-workflow/exercise
          - introduce-interceptors/exercise          
          - introduce-interceptors/solution
          - use-interceptor-to-handle-auth-failure/exercise
          - use-interceptor-to-handle-auth-failure/solution          
          - applying-best-practices/exercise
          - applying-best-practices/solution
          - understand-temporal-integration-with-spring-boot/exercise          
          - understand-temporal-integration-with-spring-boot/solution
          - testing/exercise          
          - testing/solution          
          - worker-versioning/exercise          
          - worker-versioning/solution   
          - priority-and-fairness/exercise          
          - priority-and-fairness/solution
          - worker-tuning/demo
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          cache-dependency-path: >-
            ${{ matrix.solution }}/pom.xml

      - name: Build ${{ matrix.solution }}
        working-directory: ${{ matrix.solution }}
        run: ./mvnw package -DskipTests --batch-mode --no-transfer-progress
