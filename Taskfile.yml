# Taskfile for workshop exercises.
# When adding a new solution with a pom.xml,
# add a test task below and include it in the
# 'test' task dependencies.

version: "3"

vars:
  MVN_OPTS: --batch-mode --no-transfer-progress --quiet
  SUREFIRE_JVM_OPTS: >-
    --enable-native-access=ALL-UNNAMED
    -XX:+EnableDynamicAgentLoading
    --sun-misc-unsafe-memory-access=allow
    -Xshare:off

tasks:
  test:
    desc: Test all solutions
    deps:
      - test:applying-best-practices
      - test:introduce-interceptors
      - test:priority-and-fairness
      - test:use-interceptor-to-handle-auth-failure
      - test:understand-temporal-integration-with-spring-boot
      - test:testing
      - test:worker-versioning
      - test:worker-tuning

  _test:
    internal: true
    dir: "{{.SOLUTION}}/solution"
    cmds:
      - ./mvnw clean test {{.MVN_OPTS}} -DargLine="{{.SUREFIRE_JVM_OPTS}}" > /dev/null 2>&1

  test:applying-best-practices:
    desc: Test applying-best-practices solution
    cmds:
      - task: _test
        vars: { SOLUTION: applying-best-practices }

  test:introduce-interceptors:
    desc: Test introduce-interceptors solution
    cmds:
      - task: _test
        vars: { SOLUTION: introduce-interceptors }

  test:use-interceptor-to-handle-auth-failure:
    desc: Test use-interceptor-to-handle-auth-failure solution
    cmds:
      - task: _test
        vars: { SOLUTION: use-interceptor-to-handle-auth-failure }

  test:understand-temporal-integration-with-spring-boot:
    desc: Test understand-temporal-integration-with-spring-boot solution
    cmds:
      - task: _test
        vars: { SOLUTION: understand-temporal-integration-with-spring-boot }

  test:priority-and-fairness:
    desc: Test priority-and-fairness solution
    cmds:
      - task: _test
        vars: { SOLUTION: priority-and-fairness }

  test:testing:
    desc: Test testing solution
    cmds:
      - task: _test
        vars: { SOLUTION: testing }

  test:worker-versioning:
    desc: Test worker-versioning solution
    cmds:
      - task: _test
        vars: { SOLUTION: worker-versioning }

  test:worker-tuning:
    desc: Test worker-tuning solution
    cmds:
      - task: _test
        vars: { SOLUTION: worker-tuning }

  temporal:start:
    desc: Start a local Temporal dev server
    interactive: true
    cmds:
      - >-
        temporal server start-dev
        --dynamic-config-value
        matching.useNewMatcher=true
        --dynamic-config-value
        matching.enableFairness=true
        --dynamic-config-value
        matching.enableMigration=true
