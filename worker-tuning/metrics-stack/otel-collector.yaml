receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_max_size: 1000
    timeout: 30s
    send_batch_size: 800

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
  debug:

service:
  pipelines:
    metrics:
      receivers: [ otlp ]
      processors: [ batch ]
      exporters: [ prometheus
        #  , debug
      ]
